<svg width="1280" height="640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="100" x2="1280" y2="100"/>
    <line x1="0" y1="200" x2="1280" y2="200"/>
    <line x1="0" y1="300" x2="1280" y2="300"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="500" x2="1280" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="640"/>
    <line x1="400" y1="0" x2="400" y2="640"/>
    <line x1="600" y1="0" x2="600" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="1000" y1="0" x2="1000" y2="640"/>
    <line x1="1200" y1="0" x2="1200" y2="640"/>
  </g>

  <!-- Accent bar top -->
  <rect width="1280" height="6" fill="url(#accent)"/>

  <!-- Logo area -->
  <circle cx="80" cy="80" r="50" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>
  <circle cx="80" cy="80" r="35" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.5"/>
  <text x="80" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="28" fill="url(#accent)">UI</text>

  <!-- Title -->
  <text x="80" y="180" font-family="system-ui, sans-serif" font-weight="300" font-size="20" fill="#64748b" letter-spacing="4">URBANIQ</text>
  <text x="80" y="240" font-family="system-ui, sans-serif" font-weight="700" font-size="56" fill="#f8fafc" letter-spacing="-0.5">
    Mumbai Urban
  </text>
  <text x="80" y="300" font-family="system-ui, sans-serif" font-weight="700" font-size="56" fill="url(#accent)" letter-spacing="-0.5">
    Intelligence Platform
  </text>

  <!-- Tagline -->
  <text x="80" y="370" font-family="system-ui, sans-serif" font-weight="400" font-size="22" fill="#94a3b8">
    Ward health scores · ML forecasts · Anomaly detection · WhatsApp complaints
  </text>

  <!-- Badge chips -->
  <rect x="80" y="400" rx="20" width="130" height="36" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="92" y="424" font-family="system-ui, sans-serif" font-weight="600" font-size="14" fill="#818cf8">Django 5.2</text>

  <rect x="224" y="400" rx="20" width="130" height="36" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="236" y="424" font-family="system-ui, sans-serif" font-weight="600" font-size="14" fill="#61DAFB">React 19</text>

  <rect x="368" y="400" rx="20" width="130" height="36" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="380" y="424" font-family="system-ui, sans-serif" font-weight="600" font-size="14" fill="#22c55e">PostGIS</text>

  <rect x="512" y="400" rx="20" width="140" height="36" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="524" y="424" font-family="system-ui, sans-serif" font-weight="600" font-size="14" fill="#EC1C24">XGBoost</text>

  <rect x="666" y="400" rx="20" width="120" height="36" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="678" y="424" font-family="system-ui, sans-serif" font-weight="600" font-size="14" fill="#F22F46">Twilio</text>

  <rect x="800" y="400" rx="20" width="120" height="36" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="812" y="424" font-family="system-ui, sans-serif" font-weight="600" font-size="14" fill="#2496ED">Docker</text>

  <!-- Right side: map illustration -->
  <g transform="translate(720, 80)">
    <!-- Abstract ward map -->
    <rect width="520" height="520" rx="16" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>

    <!-- Ward polygons (abstract Mumbai shape) -->
    <polygon points="80,80 160,60 220,100 200,160 140,180 90,150 60,120" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
    <polygon points="220,100 310,70 370,120 340,190 280,200 200,160" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.5"/>
    <polygon points="370,120 440,90 490,140 460,210 400,230 340,190" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
    <polygon points="60,120 90,150 140,180 130,260 100,290 40,270 20,200" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
    <polygon points="200,160 280,200 300,270 240,290 180,260 130,260 140,180" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
    <polygon points="340,190 400,230 420,300 350,320 300,270 280,200" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
    <polygon points="460,210 510,180 560,220 540,300 490,310 420,300 400,230" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.5"/>
    <polygon points="130,260 180,260 240,290 220,360 160,370 100,290" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
    <polygon points="300,270 350,320 370,390 310,410 250,380 220,360 240,290" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.5"/>
    <polygon points="420,300 490,310 520,380 460,410 400,400 370,390 350,320" fill="none" stroke="#6366f1" stroke-width="2" opacity="0.6"/>
    <polygon points="160,370 220,360 250,380 230,450 170,460 120,430 100,290" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.5"/>
    <polygon points="310,410 370,390 400,400 390,460 340,470 280,450 250,380" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.5"/>
    <polygon points="460,410 520,380 560,430 530,480 470,490 420,470 390,460" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.5"/>

    <!-- Health score indicators -->
    <circle cx="310" cy="70" r="6" fill="#22c55e"/>
    <circle cx="160" cy="60" r="5" fill="#22c55e"/>
    <circle cx="440" cy="90" r="5" fill="#f59e0b"/>
    <circle cx="510" cy="180" r="6" fill="#6366f1"/>
    <circle cx="100" cy="290" r="5" fill="#ef4444"/>
    <circle cx="370" cy="390" r="5" fill="#22c55e"/>
    <circle cx="230" cy="450" r="4" fill="#f59e0b"/>
    <circle cx="530" cy="480" r="5" fill="#6366f1"/>

    <!-- "24 Wards" label -->
    <rect x="200" y="490" rx="10" width="120" height="28" fill="url(#accent)" opacity="0.15"/>
    <text x="260" y="509" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="14" fill="#818cf8">24 WARDS</text>
  </g>

  <!-- Stats bar at bottom -->
  <rect y="580" width="1280" height="60" fill="#0f172a" opacity="0.6"/>
  <line x1="0" y1="580" x2="1280" y2="580" stroke="#1e293b" stroke-width="1"/>

  <text x="80" y="618" font-family="system-ui, sans-serif" font-weight="700" font-size="20" fill="#f8fafc">18</text>
  <text x="100" y="618" font-family="system-ui, sans-serif" font-weight="400" font-size="14" fill="#64748b">Categories</text>

  <text x="280" y="618" font-family="system-ui, sans-serif" font-weight="700" font-size="20" fill="#f8fafc">13</text>
  <text x="300" y="618" font-family="system-ui, sans-serif" font-weight="400" font-size="14" fill="#64748b">Years of Data</text>

  <text x="500" y="618" font-family="system-ui, sans-serif" font-weight="700" font-size="20" fill="#f8fafc">4</text>
  <text x="520" y="618" font-family="system-ui, sans-serif" font-weight="400" font-size="14" fill="#64748b">ML Models</text>

  <text x="740" y="618" font-family="system-ui, sans-serif" font-weight="700" font-size="20" fill="#f8fafc">22</text>
  <text x="760" y="618" font-family="system-ui, sans-serif" font-weight="400" font-size="14" fill="#64748b">API Endpoints</text>

  <!-- GitHub corner hint -->
  <text x="1100" y="618" font-family="system-ui, sans-serif" font-weight="400" font-size="13" fill="#334155">
    github.com/MohdSaadMa07
  </text>
</svg>
